<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <main class="contenedor">
        <header>
            <h1>Mis Tareas</h1>
            <span id="contador">Tareas: 0</span>
        </header>
    
        <section class="entrada-tareas">
            <input type="text" id="nueva-tarea" placeholder="Agregar nueva tarea">
            <button id="btn-agregar">Agregar</button>
        </section>

        <p class="texto-info">Mis Pendientes</p>

        <section class="lista-tareas">
            <ul id="lista">
                <li>
                    <span class="checkbox"></span>
                    <span class="tarea-texto">Revisar Código</span>
                    <button class="btn-eliminar">Eliminar</button>
                </li>
                <li>
                    <span class="checkbox"></span>
                    <span class="tarea-texto">Hacer Commit</span>
                    <button class="btn-eliminar">Eliminar</button>
                </li>
            </ul>
        </section>
        <nav class="acciones">
            <button id="btn-ocultar">Ocultar Completadas</button>
        </nav>
    </main>
    <script src="script.js"></script>
</body>
</html>
